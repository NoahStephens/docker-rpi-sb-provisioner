name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: rpi-sb-provisioner
  DOCKERHUB_NAMESPACE: noahstephens
  GHCR_NAMESPACE: noahstephens

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix from versions.json
        id: matrix
        run: |
          matrix_json="$(
            jq -c '
              def splitNum: split(".") | map(tonumber);
              def topVersion: (keys | sort_by(splitNum) | last);
              . as $doc
              | topVersion as $top
              | [
                  to_entries[]
                  | .key as $version
                  | .value as $entry
                  | ($version | split(".")[0]) as $major
                  | $entry.variants
                  | to_entries[]
                  | .key as $variant
                  | .value as $variantEntry
                  | {
                      version: $version,
                      fullVersion: $entry.version,
                      gitRef: $entry.gitRef,
                      gitCommit: $entry.gitCommit,
                      variant: $variant,
                      directory: ($version + "/" + $variant),
                      platforms: ($variantEntry.platforms | join(",")),
                      tags: (
                        [
                          ($entry.version + "-" + $variant),
                          ($version + "-" + $variant),
                          ($major + "-" + $variant)
                        ]
                        + (
                          if $variant == $entry.defaultVariant then
                            [
                              $entry.version,
                              $version,
                              $major
                            ] + (if $version == $top then [ "latest" ] else [] end)
                          else
                            []
                          end
                        )
                      )
                    }
                ]
            ' versions.json
          )"
          printf 'matrix={"include":%s}\n' "$matrix_json" >> "$GITHUB_OUTPUT"
          jq . <<<"$matrix_json"

  docker:
    name: build ${{ matrix.directory }}
    runs-on: ubuntu-latest
    needs:
      - matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME || env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tags
        id: tags
        env:
          TAGS_JSON: ${{ toJson(matrix.tags) }}
        run: |
          mapfile -t tags < <(jq -r '.[]' <<<"$TAGS_JSON")
          repos=(
            "docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}"
            "ghcr.io/${GHCR_NAMESPACE}/${IMAGE_NAME}"
          )

          {
            echo "tags<<EOF"
            for repo in "${repos[@]}"; do
              for tag in "${tags[@]}"; do
                echo "${repo}:${tag}"
              done
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.directory }}
          file: ${{ matrix.directory }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ matrix.fullVersion }}
            org.opencontainers.image.revision=${{ matrix.gitCommit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
