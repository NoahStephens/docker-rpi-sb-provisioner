name: ci

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build and publish (for example v2.2.0)
        required: false
        type: string
      push_images:
        description: Push built images when manually dispatching the workflow
        required: false
        default: false
        type: boolean
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  release:
    types:
      - published
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: rpi-sb-provisioner
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_USERNAME }}
  GHCR_NAMESPACE: noahstephens

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix from versions.json
        id: matrix
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event_name == 'release' && github.event.release.tag_name || startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          matrix_json="$(
            jq -c --arg releaseTag "$RELEASE_TAG" '
              def splitNum: split(".") | map(tonumber);
              def topVersion: (keys | sort_by(splitNum) | last);
              . as $doc
              | topVersion as $top
              | [
                  to_entries[]
                  | .key as $version
                  | .value as $entry
                  | select($releaseTag == "" or $entry.gitRef == $releaseTag or ("v" + $entry.version) == $releaseTag)
                  | ($version | split(".")[0]) as $major
                  | $entry.variants
                  | to_entries[]
                  | .key as $variant
                  | .value as $variantEntry
                  | {
                      version: $version,
                      fullVersion: $entry.version,
                      gitRef: $entry.gitRef,
                      gitCommit: $entry.gitCommit,
                      variant: $variant,
                      directory: ($version + "/" + $variant),
                      platforms: ($variantEntry.platforms | join(",")),
                      tags: (
                        [
                          ($entry.version + "-" + $variant),
                          ($version + "-" + $variant),
                          ($major + "-" + $variant)
                        ]
                        + (
                          if $variant == $entry.defaultVariant then
                            [
                              $entry.version,
                              $version,
                              $major
                            ] + (if $version == $top then [ "latest" ] else [] end)
                          else
                            []
                          end
                        )
                      )
                    }
                ]
            ' versions.json
          )"

          if [ -n "$RELEASE_TAG" ] && [ "$(jq 'length' <<<"$matrix_json")" -eq 0 ]; then
            echo "error: no versions.json entry matches release tag $RELEASE_TAG" >&2
            exit 1
          fi

          printf 'matrix={"include":%s}\n' "$matrix_json" >> "$GITHUB_OUTPUT"
          jq . <<<"$matrix_json"

  docker:
    name: build ${{ matrix.directory }}
    runs-on: ubuntu-latest
    needs:
      - matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether to push images
        id: publish
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
          DISPATCH_PUSH_IMAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.push_images || 'false' }}
        run: |
          should_push=false
          if [ "$EVENT_NAME" = "release" ] || [[ "$REF" == refs/tags/v* ]]; then
            should_push=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_PUSH_IMAGES" = "true" ] && [ -n "$RELEASE_TAG" ]; then
            should_push=true
          fi
          echo "should_push=$should_push" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.publish.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: steps.publish.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build tags
        id: tags
        env:
          TAGS_JSON: ${{ toJson(matrix.tags) }}
        run: |
          mapfile -t tags < <(jq -r '.[]' <<<"$TAGS_JSON")
          repos=(
            "docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}"
            "ghcr.io/${GHCR_NAMESPACE}/${IMAGE_NAME}"
          )

          {
            echo "tags<<EOF"
            for repo in "${repos[@]}"; do
              for tag in "${tags[@]}"; do
                echo "${repo}:${tag}"
              done
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.directory }}
          file: ${{ matrix.directory }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: ${{ steps.publish.outputs.should_push == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ matrix.fullVersion }}
            org.opencontainers.image.revision=${{ matrix.gitCommit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
